<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CodeSync — совместный редактор</title>
  <!-- JSZip для скачивания проекта -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ===== CSS-переменные (темы) ===== */
    :root {
      /* Светлая тема (по умолчанию) */
      --bg-app: #ffffff;
      --bg-header: #fafafa;
      --bg-left: #f5f5f5;
      --bg-file-hover: #e8e8e8;
      --bg-file-active: #e0e0e0;
      --bg-participant: #fafafa;
      --bg-terminal: #f9f9f9;
      --bg-terminal-header: #f0f0f0;
      --bg-modal: #ffffff;
      --bg-input: #ffffff;
      --bg-btn-primary: #007acc;
      --bg-btn-primary-hover: #005a9e;
      --bg-btn-secondary: #f5f5f5;
      --bg-btn-secondary-border: #e0e0e0;
      --bg-btn-cancel: #f0f0f0;
      --bg-badge: #e8f0fe;
      --bg-error: #ffebee;
      --bg-toast: #333333;

      --text-primary: #1e1e1e;
      --text-secondary: #555555;
      --text-muted: #888888;
      --text-inverse: #ffffff;
      --text-error: #c62828;
      --text-link: #007acc;

      --border-color: #e0e0e0;
      --border-active: #007acc;
      --shadow-modal: 0 20px 35px rgba(0,0,0,0.2);
      --shadow-toast: 0 0 10px rgba(0,0,0,0.3);

      --scrollbar-track: #f0f0f0;
      --scrollbar-thumb: #c1c1c1;
    }

    /* Тёмная тема */
    body.theme-dark {
      --bg-app: #1e1e1e;
      --bg-header: #2d2d2d;
      --bg-left: #252526;
      --bg-file-hover: #3a3a3a;
      --bg-file-active: #3a3a3a;
      --bg-participant: #2d2d2d;
      --bg-terminal: #1e1e1e;
      --bg-terminal-header: #2d2d2d;
      --bg-modal: #2d2d2d;
      --bg-input: #3a3a3a;
      --bg-btn-primary: #007acc;
      --bg-btn-primary-hover: #3399ff;
      --bg-btn-secondary: #3a3a3a;
      --bg-btn-secondary-border: #555555;
      --bg-btn-cancel: #3a3a3a;
      --bg-badge: #1e3a5f;
      --bg-error: #4a1a1a;
      --bg-toast: #444444;

      --text-primary: #d4d4d4;
      --text-secondary: #aaaaaa;
      --text-muted: #888888;
      --text-inverse: #ffffff;
      --text-error: #ff6b6b;
      --text-link: #4da6ff;

      --border-color: #3a3a3a;
      --border-active: #007acc;
      --shadow-modal: 0 20px 35px rgba(0,0,0,0.6);
      --shadow-toast: 0 0 10px rgba(0,0,0,0.6);

      --scrollbar-track: #2d2d2d;
      --scrollbar-thumb: #555555;
    }

    /* Нейтральная (приглушённая) тема */
    body.theme-soft {
      --bg-app: #f0f2f5;
      --bg-header: #e8eaed;
      --bg-left: #e2e4e8;
      --bg-file-hover: #d5d7dc;
      --bg-file-active: #c8cad0;
      --bg-participant: #e8eaed;
      --bg-terminal: #f5f6f8;
      --bg-terminal-header: #e8eaed;
      --bg-modal: #f5f6f8;
      --bg-input: #ffffff;
      --bg-btn-primary: #6c8c9c;
      --bg-btn-primary-hover: #5a7a8a;
      --bg-btn-secondary: #e8eaed;
      --bg-btn-secondary-border: #c5c8ce;
      --bg-btn-cancel: #e8eaed;
      --bg-badge: #d0d8e0;
      --bg-error: #fce4e4;
      --bg-toast: #4a5a6a;

      --text-primary: #2c3e50;
      --text-secondary: #4a5a6a;
      --text-muted: #7a8a9a;
      --text-inverse: #ffffff;
      --text-error: #b33a3a;
      --text-link: #5a7a8a;

      --border-color: #c5c8ce;
      --border-active: #6c8c9c;
      --shadow-modal: 0 20px 35px rgba(0,0,0,0.15);
      --shadow-toast: 0 0 10px rgba(0,0,0,0.2);

      --scrollbar-track: #e8eaed;
      --scrollbar-thumb: #b0b8c0;
    }

    /* ===== Глобальные стили ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg-app);
      color: var(--text-primary);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 4px;
    }

    .app {
      width: 100%;
      height: 100%;
      background: var(--bg-app);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Экран логина ===== */
    .login {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      background: var(--bg-app);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .logo-icon {
      background: var(--bg-btn-primary);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-inverse);
      font-weight: bold;
      font-size: 18px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .login-title {
      font-size: 18px;
      color: var(--text-secondary);
      margin: 20px 0 30px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 400px;
    }

    .btn {
      background: var(--bg-btn-primary);
      color: var(--text-inverse);
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--bg-btn-primary-hover);
    }

    .btn.secondary {
      background: var(--bg-btn-secondary);
      color: var(--text-primary);
      border: 1px solid var(--bg-btn-secondary-border);
    }

    .join {
      display: flex;
      gap: 10px;
    }

    .join input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg-input);
      color: var(--text-primary);
    }

    /* ===== Редактор ===== */
    .editor {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: default;
    }

    .room-badge {
      background: var(--bg-badge);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-family: monospace;
      color: var(--text-link);
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }

    .room-badge:hover {
      filter: brightness(0.95);
    }

    .room-badge:active {
      filter: brightness(0.9);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Переключатель тем */
    .theme-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-left);
      padding: 4px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }

    .theme-btn {
      background: transparent;
      border: none;
      padding: 4px 8px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 0.2s, transform 0.1s;
      color: var(--text-secondary);
    }

    .theme-btn:hover {
      background: var(--bg-file-hover);
    }

    .theme-btn.active {
      background: var(--bg-btn-primary);
      color: var(--text-inverse);
      transform: scale(1.05);
    }

    .share {
      background: var(--bg-btn-primary);
      color: var(--text-inverse);
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.2s;
    }
    .share:hover {
      background: var(--bg-btn-primary-hover);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #ccc;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: #2e7d32;
      box-shadow: 0 0 6px #4caf50;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
